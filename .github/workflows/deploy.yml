name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          node-version: 24

      - name: Verify built media uses Cloudflare R2
        run: node scripts/verify-r2-media-build.mjs

      # Required repository configuration:
      # - CLOUDFLARE_API_TOKEN secret with Workers R2 Storage Edit permission
      #   for the account that owns the guccident-media bucket.
      # - CLOUDFLARE_ACCOUNT_ID Actions variable for the target account.
      - name: Sync public media to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: guccident-media
        run: node scripts/sync-r2-media.mjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
